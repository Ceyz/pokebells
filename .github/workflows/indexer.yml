name: Deploy indexer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "game/indexer/**"
      # The indexer reuses the canonical capture-core + gen2-species at
      # deploy time (synced into src/ by the workflow). A change to either
      # MUST trigger an indexer redeploy so validators stay in lock-step.
      - "game/capture-core.mjs"
      - "game/gen2-species.mjs"
      - ".github/workflows/indexer.yml"

permissions:
  contents: read

concurrency:
  group: indexer
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: game/indexer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: game/indexer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync v1.5 shared modules into indexer
        # The indexer reuses capture-core's v1.5 builders + validators
        # to avoid drifting two implementations. gen2-species ships the
        # 251-entry catalog the validator needs for species/catch_rate
        # cross-checks.
        working-directory: .
        run: |
          cp game/capture-core.mjs game/indexer/src/capture-core.mjs
          cp game/gen2-species.mjs game/indexer/src/gen2-species.mjs

      - name: Check syntax
        run: npm run check

      - name: Apply D1 schema (idempotent)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run d1:migrate

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
