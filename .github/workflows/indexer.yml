name: Deploy indexer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "game/indexer/**"
      - ".github/workflows/indexer.yml"

permissions:
  contents: read

concurrency:
  group: indexer
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: game/indexer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: game/indexer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: npm run check

      - name: Apply D1 schema (idempotent)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run d1:migrate

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
